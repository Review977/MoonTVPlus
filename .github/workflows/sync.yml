name: Sync Fork

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时同步一次
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0     # 💡 保证能正确 merge
          ref: main

      - name: Add upstream repository
        run: git remote add upstream https://github.com/mtvpls/MoonTVPlus.git

      - name: Fetch upstream main branch
        run: git fetch upstream main

      - name: Merge upstream/main into local main
        run: |
          git merge upstream/main --no-edit || (
            echo "Merge conflict detected, aborting merge";
            git merge --abort;
            exit 1
          )

      - name: Push changes
        if: success()
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
